<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tauri Icon Manager</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- React 18 + ReactDOM + Babel for JSX transformation (本地文件) -->
  <script src="vendor/react.development.js"></script>
  <script src="vendor/react-dom.development.js"></script>
  <script src="vendor/babel.min.js"></script>
  <!-- i18n -->
  <script src="i18n.js"></script>
  <script>
    // Set dynamic page title based on current language
    (function() {
      var title = window.i18n.t('pageTitle');
      if (title) document.title = title;
    })();
    window.addEventListener('i18n-change', function() {
      document.title = window.i18n.t('pageTitle');
    });
  </script>
</head>
<body>
<div id="root"></div>
<script src="bridge.js"></script>
<script src="main.js"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
